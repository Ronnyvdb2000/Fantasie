name: "Bot 00: FULL Scanner (041-059) MR EOD"

on:
  schedule:
    - cron: "30 19 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "eod | orb | status | backtest"
        required: false
        default: "eod"

jobs:
  bot-00mr-eod:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install yfinance pandas numpy requests python-dotenv
      - name: Run bot_00mr EOD
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_USER:       ${{ secrets.EMAIL_USER }}
          EMAIL_PASS:       ${{ secrets.EMAIL_PASS }}
          EMAIL_RECEIVER:   ${{ secrets.EMAIL_RECEIVER }}
        run: python bot_00mr.py ${{ github.event.inputs.mode || 'eod' }}
      - name: Opslaan state
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f mr_portfolio.json mr_trades.csv mr_snapshots.csv 2>/dev/null || true
          git diff --cached --quiet || git commit -m "bot_00mr EOD $(date '+%Y-%m-%d')"
          git push
