name: "00 FULL Scanner (01-09)"

on:
  workflow_dispatch: # Handmatige start
  schedule:
    # Draait elke 3 uur op werkdagen (ma-vr) op het 40ste minuut
    - cron: '40 */3 * * 1-5'

jobs:
  run_global:
    runs-on: ubuntu-latest
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Bibliotheken installeren
        run: |
          pip install yfinance pandas requests python-dotenv numpy

      - name: Voer Globale Bot uit
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot_00.py
