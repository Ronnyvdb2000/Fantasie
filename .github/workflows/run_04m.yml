name: Munger Ticker Filter (04m)

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  filter_tickers:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas

      - name: Draai Munger Filter Bot
        run: python bot_04m.py

      - name: Check of bestand bestaat
        run: |
          if [ -f "tickers_04m.txt" ]; then
            echo "Bestand tickers_04m.txt is succesvol aangemaakt."
            ls -l tickers_04m.txt
          else
            echo "FOUT: tickers_04m.txt is NIET gevonden!"
            exit 1
          fi

      - name: Commit en Push resultaten
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # Gebruik -f om force add te doen indien nodig, maar git add is meestal genoeg
          git add tickers_04m.txt
          # Alleen committen als er echt wijzigingen zijn
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update: tickers_04m.txt bijgewerkt via Munger Filter" && git push)
