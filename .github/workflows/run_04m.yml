name: Bot 04: Munger Ticker Filter (04m)

on:
  schedule:
    # Draait elke zondag om 00:00 om de week met een verse lijst te beginnen
    - cron: '0 0 * * 0'
  workflow_dispatch:
    # Hiermee kun je de actie handmatig starten in het GitHub 'Actions' tabblad

jobs:
  filter_tickers:
    runs-on: ubuntu-latest

    # De runner heeft schrijfrechten nodig om de nieuwe bestanden te kunnen pushen
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests

      - name: Draai Munger Filter Bot
        # Geef de geheime Telegram tokens door aan het Python script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot_04m.py

      - name: Commit en Push resultaten
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Voeg beide bestanden toe (daglijst en masterlijst)
          git add tickers_04m.txt tickers_04xx.txt || echo "Bestanden nog niet aanwezig"
          
          # Alleen commit en push als er daadwerkelijk wijzigingen zijn
          if git diff --staged --quiet; then
            echo "Geen wijzigingen gevonden in de lijsten."
          else
            git commit -m "Automatische update: Munger Elite en Master-lijst bijgewerkt"
            git push
          fi
