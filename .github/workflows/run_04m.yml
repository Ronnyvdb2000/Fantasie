name: Munger Ticker Filter (04m)

on:
  schedule:
    # Draait elke zondag om 00:00 (tijd om de lijst voor de nieuwe week te verversen)
    - cron: '0 0 * * 0'
  workflow_dispatch:
    # Hiermee kun je de filter handmatig starten via de GitHub interface

jobs:
  filter_tickers:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas

      - name: Draai Munger Filter Bot
        run: python bot_04m.py

      - name: Commit en Push resultaten
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add tickers_04m.txt
          git commit -m "Update: tickers_04m.txt bijgewerkt via Munger Filter" || echo "Geen wijzigingen om te committen"
          git push
