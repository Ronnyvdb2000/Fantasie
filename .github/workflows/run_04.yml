name: "Bot Benelux Scanner (4 regimes)"

on:
  workflow_dispatch: 
  schedule:
    # Draait elke 2 uur (UTC tijd!)
    - cron: '40 */2 * * 1-5'

jobs:
  run_bot 04: 
    runs-on: ubuntu-latest
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Bibliotheken installeren
        run: |
          pip install yfinance pandas requests python-dotenv numpy

      - name: Voer de bot uit
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot_04.py
