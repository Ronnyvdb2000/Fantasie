name: Ronny Dual Strategy Bot

on:
  workflow_dispatch:
  schedule:
    # 08:30 UTC is 09:30 Nederlandse tijd (winter)
    # 15:00 UTC is 16:00 Nederlandse tijd (winter)
    - cron: '30 9 * * *'
    - cron: '0 16 * * *'
jobs:
  run-trading-bots:
    runs-on: ubuntu-latest
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installeren
        run: |
          pip install --upgrade pip
          pip install yfinance pandas vaderSentiment newsapi-python python-telegram-bot requests python-dotenv

      - name: Start de Bots
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          python test_telegram.py
          python bot.py
          python bot2.py
