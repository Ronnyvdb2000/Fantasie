name: Ronny Dual strategy Bot

on:
  schedule:
    # Dit draait elke werkdag om 20:00 UTC (dat is 21:00 of 22:00 in NL/BE)
    - cron: '0 20 * * 1-5'
  workflow_dispatch: # Hiermee kun je de bot ook handmatig starten via de knop

jobs:
    run-bot:
    runs-on: ubuntu-latest
      # Hiermee dwingen we GitHub om direct de nieuwste Node-versie te gebruiken
      env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Libraries installeren
        run: |
          pip install -r requirements.txt
      - name: Uitvoeren Lange Termijn Strategie (SMA 50/200)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python bot.py

      - name: Uitvoeren Swing Trading Strategie (EMA 13/48 + RSI)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python bot2.py
