name: Ronny Dual Strategy Bot

on:
  schedule:
    # Elke werkdag om 09:30 en 16:00 (NL/BE tijd)
    - cron: '30 8 * * 1-5'
    - cron: '0 15 * * 1-5'
  workflow_dispatch: # Zodat je beide bots ook handmatig tegelijk kunt starten

jobs:
  run-trading-bots:
    runs-on: ubuntu-latest
    steps:
      - name: Code ophalen uit repository
        uses: actions/checkout@v3

      - name: Python 3.10 instellen
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Benodigde libraries installeren
        run: |
          pip install -r requirements.txt

      - name: Uitvoeren Lange Termijn Strategie (SMA 50/200)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python bot.py

       - name: Uitvoeren Swing Trading Strategie (EMA 13/48 + RSI)
         env:
           TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
           TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
           NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
         run: python bot2.py
