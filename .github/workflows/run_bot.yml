name: Ronny Dual Strategy Bot

on:
workflow_dispatch:
workflow_dispatch:
  schedule:
    # Draait om 08:00, 10:00, 12:00, 14:00 en 16:00 UTC
    # In de winter is dat: 09:00, 11:00, 13:00, 15:00 en 17:00 NL tijd
    - cron: '0 6, 8,10,12,14,16, 18, 21, 23 * * *'

jobs:
  run-trading-bots:
    runs-on: ubuntu-latest
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installeren
        run: |
          pip install --upgrade pip
          pip install yfinance pandas vaderSentiment newsapi-python python-telegram-bot requests python-dotenv

      - name: Start de Bots
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          python test_telegram.py
          python bot.py
          python bot2.py
