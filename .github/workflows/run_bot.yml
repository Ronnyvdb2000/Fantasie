name: Ronny Trading Bot Daily

on:
  schedule:
    # Dit draait elke werkdag om 20:00 UTC (dat is 21:00 of 22:00 in NL/BE)
    - cron: '0 20 * * 1-5'
  workflow_dispatch: # Hiermee kun je de bot ook handmatig starten via de knop

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Code ophalen
        uses: actions/checkout@v3

      - name: Python instellen
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Libraries installeren
        run: |
          pip install -r requirements.txt

      - name: De Bot uitvoeren
        env:
          # Hier koppelt GitHub jouw 'Secrets' aan het script
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python bot.py
