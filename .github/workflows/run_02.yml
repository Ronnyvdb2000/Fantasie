name: "Bot 02: Scanner (Traag & Snel)"

on:
  workflow_dispatch: # Handmatige startknop in GitHub Actions
  schedule:
    # Draait elke 2 uur op werkdagen (ma-vr) om 40 over het uur
    # Bijv: 08:40, 10:40, 12:40, 14:40, 16:40, 18:40 UTC
    - cron: '40 */2 * * 1-5'

jobs:
  run_bot_02:
    runs-on: ubuntu-latest
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Bibliotheken installeren
        run: |
          pip install yfinance pandas requests python-dotenv

      - name: Voer Bot 02 Analyse uit
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        # Zorg dat je Python-bestand in de repo ook exact bot_02.py heet
        run: python bot_02.py
