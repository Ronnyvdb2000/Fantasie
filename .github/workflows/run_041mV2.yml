name: filter_tickers MRA Nitro

on:
  schedule:
    - cron: "00 07 * * 1"  # Elke maandag om 07:00 UTC = 09:00 Belgisch
  workflow_dispatch:

jobs:
  filter_tickers:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installeer packages
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy requests

      - name: Run filter bot
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot_041mV2.py

      - name: Opslaan resultaten
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add tickers_0*m.txt tickers_0*x.txt tickers_0*d.txt
          if git diff --staged --quiet; then
            echo "Geen wijzigingen gevonden."
          else
            git commit -m "Filter update $(date +%Y-%m-%d)"
            git pull --rebase=false -X ours origin main
            git push
          fi
