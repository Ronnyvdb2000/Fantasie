 name: Bot 00: FULL Scanner (01-09) ult

on:
  schedule:
    - cron: '30 21 * * 1-5'  # 21:30 UTC = 22:30 BE (winter) | maandag t/m vrijdag
  workflow_dispatch:           # ook manueel te starten via GitHub UI

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 60        # maximale runtime 60 minuten

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Python installeren
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Dependencies installeren
        run: pip install yfinance pandas numpy requests python-dotenv

      - name: Bot uitvoeren
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_USER:       ${{ secrets.EMAIL_USER }}
          EMAIL_PASS:       ${{ secrets.EMAIL_PASS }}
          EMAIL_RECEIVER:   ${{ secrets.EMAIL_RECEIVER }}
        run: python bot_00ult.py
