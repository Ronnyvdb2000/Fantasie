 name: "Bot 10: Dagelijks 22u"

on:
  workflow_dispatch:
  schedule:
    # 21:01 UTC is 22:01 uur in België/Nederland (winter)
    - cron: '01 21 * * *'

jobs:
  run_bot_10:
    runs-on: ubuntu-latest
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Bibliotheken installeren
        run: |
          pip install yfinance pandas requests python-dotenv numpy

      - name: Voer Bot 10 uit
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        run: python bot_10.py
