name: "Bot: Benelux (BEL20 & AEX)"

on:
  workflow_dispatch: # Handmatige startknop
  schedule:
    # Draait elke 2 uur op werkdagen (om :35 over het uur)
    # Bijv: 08:25, 10:25, 12:25, etc.
    - cron: '35 */2 * * 1-5'

jobs:
  run_benelux:
    runs-on: ubuntu-latest
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4
      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Bibliotheken installeren
        run: pip install yfinance pandas requests python-dotenv
      - name: Voer Benelux Analyse uit
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot_benelux.py
